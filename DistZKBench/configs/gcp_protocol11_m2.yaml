schema_version: 2

experiment:
  name: protocol11_m2_paper100
  run_id: auto
  output_dir: results
  random_seed: 20260711
  repetitions: 1
  warmups: 1
  # perf/resctrl are supplemental and may be reported unsupported; requested
  # cgroup/affinity/topology/verifier capabilities still fail closed.
  fail_on_warning: false

platform:
  backend: linux

roles:
  prover_ranks: 2
  master_rank: 0
  master_participates: true
  master_has_local_shard: true
  verifier_enabled: true

topology:
  type: star
  worker_to_worker: forbidden
  enforce_topology: true

resources:
  worker_threads: 4
  verifier_threads: same_as_worker
  no_overcommit: true
  check_extra_threads: true

memory:
  per_rank_limit: 40GiB
  cgroup: true

network:
  transport: tcp
  mode: loopback
  base_port: 39300

metrics:
  perf: false

protocol:
  adapter: pq-depcs-adapter
  mode: sdk-binary
  command: ../pq_dPCS/target/release/pq-experiments
  prove_subcommand: dzb-prove
  verify_subcommand: dzb-verify
  parameters:
    opening: protocol11
    batch_claims: 2
    nv: 18
    security: paper100
    queries: 0

timeouts:
  connection_setup_sec: 60
  prove_sec: 21600
  verify_sec: 7200

sweep:
  axes:
    - path: protocol.parameters.nv
      values: [18, 19, 20, 21, 22, 23, 24]
    - path: roles.prover_ranks
      values: [2, 4]
    - path: protocol.parameters.opening
      values: [protocol11, protocol11-batch]
