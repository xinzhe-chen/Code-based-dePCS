experiment:
  name: toy_pingpong_2
  run_id: auto
  output_dir: results
  random_seed: 12345

platform:
  backend: auto

roles:
  prover_ranks: 2
  master_rank: 0
  verifier_enabled: true

topology:
  type: star
  worker_to_worker: forbidden
  enforce_topology: true

resources:
  worker_threads: 1
  verifier_threads: same_as_worker

network:
  transport: tcp
  mode: loopback
  base_port: 39200
  max_frame_payload: 16MiB

protocol:
  adapter: toy-pingpong
  mode: sdk-binary
  toy:
    message_bytes: 1024

