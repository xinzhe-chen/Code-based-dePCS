schema_version: 2
experiment:
  name: pq_depcs_batch_small
  run_id: auto
  output_dir: results
  random_seed: 12345

platform:
  backend: auto

roles:
  prover_ranks: 2
  master_rank: 0
  verifier_enabled: true

topology:
  type: star
  worker_to_worker: forbidden
  enforce_topology: true

resources:
  worker_threads: 1
  verifier_threads: same_as_worker

network:
  transport: tcp
  mode: loopback
  base_port: 39240

protocol:
  adapter: pq-depcs-adapter
  mode: sdk-binary
  command: ../pq_dPCS/target/debug/pq-experiments
  prove_subcommand: dzb-prove
  verify_subcommand: dzb-verify
  parameters:
    opening: protocol11-batch
    batch_claims: 2
    nv: 10
    security: test-only
    queries: 2
