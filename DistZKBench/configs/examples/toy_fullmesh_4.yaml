experiment:
  name: toy_fullmesh_4
  run_id: auto
  output_dir: results
  random_seed: 12345

platform:
  backend: auto

roles:
  prover_ranks: 4
  master_rank: 0
  verifier_enabled: true

topology:
  type: full-mesh
  worker_to_worker: allowed
  enforce_topology: true

resources:
  worker_threads: 1
  verifier_threads: same_as_worker

network:
  transport: tcp
  mode: loopback
  base_port: 39100
  max_frame_payload: 16MiB

protocol:
  adapter: toy-alltoall
  mode: sdk-binary
  toy:
    message_bytes: 1024

