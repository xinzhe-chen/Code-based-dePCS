experiment:
  name: blackbox_echo
  run_id: auto
  output_dir: results

platform:
  backend: auto

roles:
  prover_ranks: 1
  master_rank: 0
  verifier_enabled: false

topology:
  type: star
  enforce_topology: true

network:
  transport: tcp
  mode: loopback
  base_port: 39200

protocol:
  adapter: /bin/echo
  mode: black-box
  args:
    - DistZKBench black-box smoke
