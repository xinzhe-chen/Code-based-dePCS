<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" shape-rendering="geometricPrecision">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
.title { font-size: 18px; font-weight: 700; }
