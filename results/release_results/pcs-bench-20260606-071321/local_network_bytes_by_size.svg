<svg xmlns="http://www.w3.org/2000/svg" width="980" height="478" viewBox="0 0 980 478">
<title>PCS local network bytes by size</title>
<!-- PCS chart uses stroke-dasharray for series distinction. -->
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="490" y="32" text-anchor="middle" font-family="Arial" font-size="20">PCS local network bytes by size</text>
<text x="18" y="210" transform="rotate(-90 18 210)" text-anchor="middle" font-family="Arial" font-size="13">Network bytes (KiB)</text>
<text x="520" y="402" text-anchor="middle" font-family="Arial" font-size="13">PCS polynomial exponent n in N=2^n</text>
<line x1="86" y1="350" x2="940" y2="350" stroke="#444"/>
<line x1="86" y1="70" x2="86" y2="350" stroke="#444"/>
<line x1="86" y1="350.0" x2="940" y2="350.0" stroke="#e5e7eb"/>
<text x="76" y="351.0" text-anchor="end" dominant-baseline="middle" font-family="Arial" font-size="12">10^0</text>
<line x1="86" y1="70.0" x2="940" y2="70.0" stroke="#e5e7eb"/>
<text x="76" y="71.0" text-anchor="end" dominant-baseline="middle" font-family="Arial" font-size="12">10^1</text>
<text x="86.0" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=4</text>
<text x="157.2" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=5</text>
<text x="228.3" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=6</text>
<text x="299.5" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=7</text>
<text x="370.7" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=8</text>
<text x="441.8" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=9</text>
<text x="513.0" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=10</text>
<text x="584.2" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=11</text>
<text x="655.3" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=12</text>
<text x="726.5" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=13</text>
<text x="797.7" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=14</text>
<text x="868.8" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=15</text>
<text x="940.0" y="374" text-anchor="middle" font-family="Arial" font-size="12">n=16</text>
<text x="490" y="215" text-anchor="middle" font-family="Arial" font-size="14" fill="#6b7280">No positive rows for this runner/metric.</text>
<text x="90" y="470.0" font-family="Arial" font-size="11" fill="#6b7280">Non-positive values are omitted from the log-scale plot.</text>
</svg>
