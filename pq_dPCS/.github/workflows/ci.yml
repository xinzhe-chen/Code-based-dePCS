name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        # Lint only our crates (--no-deps): the vendored deepfold-bench path-deps
        # are a separate workspace with their own pre-existing clippy nits.
        run: cargo clippy -p pq-core -p pq-pcs -p pq-experiments --no-deps --all-targets -- -D warnings

      - name: Tests
        # Scope to our crates: the vendored deepfold-bench path-deps are a
        # separate workspace whose members include heavy benchmark-style tests
        # (e.g. basefold) that would otherwise run under --workspace.
        run: cargo test -p pq-core -p pq-pcs -p pq-experiments

      - name: Windows benchmark launcher smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $help = cmd /c "scripts\pcs-benchmark-powershell.cmd" --help 2>&1 | Out-String
          $help
          if ($LASTEXITCODE -ne 0) { throw "benchmark launcher --help failed" }
          if ($help -notmatch "usage") { throw "benchmark.py usage not rendered" }

      - name: Bash benchmark launcher smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n scripts/pcs-benchmark-linux.sh
          bash -n scripts/pcs-benchmark-macos.sh
          help="$(bash scripts/pcs-benchmark-linux.sh --help 2>&1)"
          printf '%s\n' "$help"
          grep -qi 'usage' <<< "$help"

      - name: dePCS benchmark + verify smoke
        shell: bash
        run: |
          cargo run -p pq-experiments --release -- pcs-benchmark \
            --opening protocol11 --backend deepfold --nv-values 10 --workers 2 \
            --no-pcs-warmup --out results
          latest=""
          for dir in results/pcs-bench-*; do
            test -d "$dir" || continue
            latest="$dir"
          done
          test -n "$latest"
          verify_output="$(cargo run -p pq-experiments --release -- verify-pcs-results --dir "$latest" --format json)"
          printf '%s\n' "$verify_output"
          grep -q '"ok":true' <<< "$verify_output"
