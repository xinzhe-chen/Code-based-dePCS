name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: pq_dPCS
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p pq-core -p pq-pcs -p pq-experiments --no-deps --all-targets -- -D warnings
      - name: Tests
        run: cargo test -p pq-core -p pq-pcs -p pq-experiments
      - name: Protocol 11 artifact smoke
        shell: bash
        run: |
          cargo run -p pq-experiments --release -- pcs-benchmark \
            --opening protocol11 --backend deepfold --nv-values 10 --workers 2 \
            --pcs-queries 4 --allow-insecure-test-profile --no-pcs-warmup --out results
          latest="$(find results -maxdepth 1 -type d -name 'pcs-bench-*' | sort | tail -n 1)"
          test -n "$latest"
          cargo run -p pq-experiments --release -- verify-pcs-results \
            --dir "$latest" --format json | grep -q '"ok":true'
