name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Windows benchmark script smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $menu = "0" | cmd /c "scripts\pcs-benchmark-powershell.cmd" 2>&1 | Out-String
          $menu
          if ($LASTEXITCODE -ne 0) { throw "benchmark menu exit smoke failed" }
          if ($menu -notmatch "Distributed Brakedown PCS benchmark") { throw "benchmark menu title missing" }
          if ($menu -notmatch "Run PCS benchmark") { throw "benchmark menu run option missing" }

      - name: Bash benchmark script smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n scripts/pcs-benchmark-linux.sh
          bash -n scripts/pcs-benchmark-macos.sh
          menu="$(printf '0\n' | bash scripts/pcs-benchmark-linux.sh 2>&1)"
          printf '%s\n' "$menu"
          grep -q 'Distributed Brakedown PCS benchmark' <<< "$menu"
          grep -q 'Run PCS benchmark' <<< "$menu"

      - name: dePCS benchmark + verify smoke
        shell: bash
        run: |
          cargo run -p pq-experiments --release -- pcs-benchmark \
            --opening protocol11 --backend deepfold --nv-values 10 --workers 2 \
            --no-pcs-warmup --out results
          latest=""
          for dir in results/pcs-bench-*; do
            test -d "$dir" || continue
            latest="$dir"
          done
          test -n "$latest"
          verify_output="$(cargo run -p pq-experiments --release -- verify-pcs-results --dir "$latest" --format json)"
          printf '%s\n' "$verify_output"
          grep -q '"ok":true' <<< "$verify_output"
