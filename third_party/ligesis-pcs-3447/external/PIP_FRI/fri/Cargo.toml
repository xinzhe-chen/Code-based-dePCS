[package]
name = "fri"
version = "0.1.0"
edition = "2021"

[dependencies]
ark-ff = { version = "0.4"}
ark-std = { version = "0.4.0"}
rand = {version = "0.8.5"}
ark-poly = { version = "0.4"}
ark-serialize = { version = "0.4", features = [ "derive" ] }
utils = {path = "../utils"}
de_network = { version = "0.1.0", path = "../de_network"}
structopt = "0.3"
rayon = { version = "1"}
rs_merkle = {version = "1.4"}

[features]
# default = [ "parallel", "asm" ]
# default = [ "parallel"]
# parallel = [ "rayon", "ark-ff/parallel", "ark-poly/parallel"]
# asm = [ "ark-ff" ]
print-trace = [ "ark-std/print-trace" ]

[dev-dependencies]
criterion = "0.4.0"

[[bench]]
name = "bench"
harness = false
