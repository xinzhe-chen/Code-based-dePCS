[package]
name = "deepfold"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
ark-ff = { version = "0.4.0"}
ark-std = { version = "0.4.0"}
rand = {version = "0.8.5"}
ark-poly = { version = "0.4"}
ark-serialize = { version = "0.4", features = [ "derive" ] }
utils = { path = "../utils" }
csv = "1.3.0"

[dev-dependencies]
criterion = "0.4.0"

[[bench]]
name = "bench"
harness = false